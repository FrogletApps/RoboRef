<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/icons/roboref.svg" />
    <link rel="apple-touch-icon" href="/icons/roboref-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'system';
          const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.add(isDark ? 'dark' : 'light');
          document.documentElement.classList.remove(isDark ? 'light' : 'dark');
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}

        // Listen for asset loading errors (e.g. 404 on old hashed JS bundles after deployment)
        window.addEventListener('error', function(e) {
          const target = e.target;
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
            const src = target.src || target.href;
            if (src && (src.includes('/assets/') || src.endsWith('.js'))) {
              const reloadKey = 'roboref_asset_reload_' + (src.split('/').pop() || 'chunk');
              if (!sessionStorage.getItem(reloadKey)) {
                sessionStorage.setItem(reloadKey, '1');
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(regs) {
                    for (var r of regs) r.unregister();
                    window.location.reload();
                  }).catch(function() {
                    window.location.reload();
                  });
                } else {
                  window.location.reload();
                }
              }
            }
          }
        }, true);
      })();
    </script>
    <title>RoboRef</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
